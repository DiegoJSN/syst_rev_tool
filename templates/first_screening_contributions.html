{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="mb-0">First screening team contribution</h4>
  <a class="btn btn-outline-secondary" href="{{ url_for('review_main', review_id=review.id) }}">Back to main</a>
</div>

<div class="card shadow-sm">
  <div class="card-body">
    {% for r in data %}
      <div class="d-flex justify-content-between align-items-center mb-1">
        <div class="fw-semibold">{{ r.name }}</div>
        <div class="text-muted small">{{ r.count }} ({{ r.pct }}%)</div>
      </div>
      <div class="progress mb-3" style="height: 12px;">
        <div class="progress-bar bg-success" style="width: {{ r.pct }}%"></div>
      </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
